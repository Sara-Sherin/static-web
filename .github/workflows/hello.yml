name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22

          script: |
            #______________Update System______________________
            sudo yum update -y || sudo apt-get update -y

            #______________Install Apache_____________________
            sudo yum install -y httpd || sudo apt-get install -y apache2

            #_______________Start & Enable Apache______________
            sudo systemctl start httpd || sudo systemctl start apache2
            sudo systemctl enable httpd || sudo systemctl enable apache2

            #_______________Deploy App Files_____________________
            cd /var/www/html
            sudo rm -rf *

            sudo git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git .

            #_______________Set Permissions_____________________
            sudo chown -R apache:apache /var/www/html || \
            sudo chown -R www-data:www-data /var/www/html

            sudo chmod -R 755 /var/www/html

            #________________Verify Apache______________________
            sudo systemctl status httpd || sudo systemctl status apache2
